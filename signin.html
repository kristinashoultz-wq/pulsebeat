<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PulseBeat — Sign In</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="auth-page">
    <main>
      <div class="auth-card">
        <h1>PulseBeat</h1>
        <p>Feel what matters.</p>

        <form id="signin-form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>

          <label>
            <input type="checkbox" id="age" name="age" required>
            I confirm I am 18 or older
          </label>

          <p id="error-msg" style="color: #f85149; display: none;"></p>

          <button type="submit">Sign In</button>
        </form>

        <p class="footer-link"><a href="signup.html">Don't have an account? Sign up</a></p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <div id="google_translate_element" style="position:fixed;bottom:16px;right:16px;z-index:999;"></div>
    <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:true,layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');}</script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      requireGuest();

      document.getElementById('signin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        const result = await signIn(email, password);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
        } else {
          window.location.href = 'chat.html';
        }
      });
    </script>
  </body>
</html>
