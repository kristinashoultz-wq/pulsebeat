<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="PulseBeat - private messaging for the Reeves family">
    <title>PulseBeat</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>PulseBeat</h1>
      <nav>
        <a href="settings.html">Settings</a>
      </nav>
    </header>

    <main>

      <div id="coming-soon-banner">
        <p>Coming soon: message history &amp; subscription plans</p>
        <button type="button" id="dismiss-banner" aria-label="Dismiss">&#x2715;</button>
      </div>

      <section id="message-list" aria-live="polite">
        <!-- Messages load here -->
      </section>

      <section id="ping-backs">
        <button type="button" id="ping-1">Response 1</button>
        <button type="button" id="ping-2">Response 2</button>
        <button type="button" id="ping-3">Response 3</button>
      </section>

      <section id="input-area">
        <form id="message-form">
          <label for="attachment" class="attachment-label" title="Attach file">📎
            <input type="file" id="attachment" name="attachment" accept="image/*,.pdf,.txt">
          </label>

          <label for="message" class="sr-only">Message</label>
          <input type="text" id="message" name="message" placeholder="Send a message..." autocomplete="off">

          <button type="submit">Send</button>
        </form>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/chat.js"></script>
    <div id="google_translate_element" style="position:fixed;bottom:16px;right:16px;z-index:999;"></div>
    <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:true,layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');}</script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
