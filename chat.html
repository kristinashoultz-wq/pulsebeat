<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PulseBeat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
  </head>
  <body>

    <header>
      <h1>PulseBeat</h1>
      <nav>
        <a href="settings.html">Settings</a>
      </nav>
    </header>

    <main>

      <section id="message-list">
        <!-- Messages load here -->
      </section>

      <section id="ping-backs">
        <button type="button" id="ping-1">Response 1</button>
        <button type="button" id="ping-2">Response 2</button>
        <button type="button" id="ping-3">Response 3</button>
      </section>

      <section id="input-area">
        <form id="message-form">
          <label for="attachment" class="attachment-label" title="Attach file">📎
            <input type="file" id="attachment" name="attachment" accept="image/*,.pdf,.txt">
          </label>

          <label for="message" class="sr-only">Message</label>
          <input type="text" id="message" name="message" placeholder="Send a message..." autocomplete="off">

          <button type="submit">Send</button>
        </form>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
