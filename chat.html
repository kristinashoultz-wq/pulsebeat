<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PulseBeat</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <h1>PulseBeat</h1>
      <nav>
        <a href="settings.html">Settings</a>
      </nav>
    </header>

    <main>

      <section id="message-list">
        <article class="message incoming">
          <p>Signal received.</p>
        </article>
        <article class="message outgoing">
          <p>Signal sent.</p>
        </article>
      </section>

      <section id="ping-backs">
        <button type="button">Response 1</button>
        <button type="button">Response 2</button>
        <button type="button">Response 3</button>
      </section>

      <section id="input-area">
        <form>
          <label for="attachment" class="attachment-label" title="Attach file">📎
            <input type="file" id="attachment" name="attachment" accept="image/*,.pdf,.txt">
          </label>

          <label for="message" class="sr-only">Message</label>
          <input type="text" id="message" name="message" placeholder="Send a message...">

          <button type="submit">Send</button>
        </form>
      </section>

    </main>

  </body>
</html>
