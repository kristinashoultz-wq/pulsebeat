<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PulseBeat — Sign Up</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="auth-page">
    <main>
      <div class="auth-card">
        <h1>PulseBeat</h1>
        <p>Feel what matters.</p>

        <form id="signup-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>

          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" name="confirm" required>

          <label>
            <input type="checkbox" id="age" name="age" required>
            I confirm I am 18 or older
          </label>

          <p id="error-msg" style="color: #f85149; display: none;"></p>

          <button type="submit">Create Account</button>
        </form>

        <p class="footer-link"><a href="signin.html">Already have an account? Sign in</a></p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <div id="google_translate_element" style="position:fixed;bottom:16px;right:16px;z-index:999;"></div>
    <script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:true,layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');}</script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
      requireGuest();

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const errorMsg = document.getElementById('error-msg');

        if (password !== confirm) {
          errorMsg.textContent = 'Passwords do not match.';
          errorMsg.style.display = 'block';
          return;
        }

        const result = await signUp(name, email, password);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
        } else {
          window.location.href = 'welcome.html';
        }
      });
    </script>
  </body>
</html>
