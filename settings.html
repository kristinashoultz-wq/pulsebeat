<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>PulseBeat — Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
  </head>
  <body>

    <header>
      <h1>Settings</h1>
      <nav>
        <a href="chat.html">Back to chat</a>
      </nav>
    </header>

    <main>

      <section>
        <h2>Profile</h2>
        <article>
          <label for="display-name">Display name</label>
          <input type="text" id="display-name" name="display-name" placeholder="Your name">

          <label for="avatar" style="margin-top: 0.75rem;">Profile picture</label>
          <input type="file" id="avatar" name="avatar" accept="image/*">
        </article>
      </section>

      <section>
        <h2>Appearance</h2>
        <article>
          <fieldset>
            <legend>Theme</legend>
            <label>
              <input type="radio" name="theme" value="dark" checked>
              Dark
            </label>
            <label>
              <input type="radio" name="theme" value="light">
              Light
            </label>
          </fieldset>

          <div class="color-row" style="margin-top: 1rem;">
            <label for="color-incoming">Incoming color</label>
            <input type="color" id="color-incoming" name="color-incoming" value="#00b4a6">
          </div>

          <div class="color-row">
            <label for="color-outgoing">Outgoing color</label>
            <input type="color" id="color-outgoing" name="color-outgoing" value="#1c6b65">
          </div>
        </article>
      </section>

      <section>
        <h2>Ping backs</h2>
        <p>Customize what your three response buttons say.</p>
        <article>
          <label for="ping-1-input">Button 1</label>
          <input type="text" id="ping-1-input" name="ping-1" placeholder="Response 1" maxlength="30">

          <label for="ping-2-input" style="margin-top: 0.75rem;">Button 2</label>
          <input type="text" id="ping-2-input" name="ping-2" placeholder="Response 2" maxlength="30">

          <label for="ping-3-input" style="margin-top: 0.75rem;">Button 3</label>
          <input type="text" id="ping-3-input" name="ping-3" placeholder="Response 3" maxlength="30">
        </article>
      </section>

      <section>
        <h2>Notifications</h2>
        <article>
          <label>
            <input type="checkbox" id="notifications" name="notifications">
            Enable push notifications
          </label>
          <p style="margin-top: 0.5rem;">Get notified when a signal arrives, even when the app is closed.</p>
        </article>
      </section>

      <section>
        <button type="button" id="save-btn">Save settings</button>
      </section>

      <section>
        <button type="button" id="signout-btn" class="secondary">Sign out</button>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
    <script>
      requireAuth();

      // Pre-fill saved values
      document.getElementById('ping-1-input').value = localStorage.getItem('pb_ping1') || '';
      document.getElementById('ping-2-input').value = localStorage.getItem('pb_ping2') || '';
      document.getElementById('ping-3-input').value = localStorage.getItem('pb_ping3') || '';
      const savedTheme = localStorage.getItem('pb_theme') || 'dark';
      document.querySelector(`input[name="theme"][value="${savedTheme}"]`).checked = true;
      document.getElementById('color-incoming').value = localStorage.getItem('pb_color_incoming') || '#00b4a6';
      document.getElementById('color-outgoing').value = localStorage.getItem('pb_color_outgoing') || '#1c6b65';

      document.getElementById('save-btn').addEventListener('click', () => {
        saveSettings();
        document.getElementById('save-btn').textContent = 'Saved.';
        setTimeout(() => document.getElementById('save-btn').textContent = 'Save settings', 2000);
      });

      document.getElementById('signout-btn').addEventListener('click', signOut);
    </script>
  </body>
</html>
